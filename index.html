<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DutyPrice 2.1v</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --dabelle-blue: #051937;
            --dabelle-gold: #C5A059;
            --ios-bg: #F2F2F7;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: var(--ios-bg); margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            color: #1C1C1E; overflow-x: hidden;
        }

        header { background: var(--dabelle-blue); color: white; padding: 18px; text-align: center; position: sticky; top: 0; z-index: 200; }
        header h1 { margin: 0; font-size: 1.4rem; font-weight: 800; color: var(--dabelle-gold); }
        .version-tag { font-size: 0.6rem; position: absolute; top: 10px; right: 15px; opacity: 0.5; }

        nav { display: flex; background: var(--white); border-bottom: 0.5px solid #C6C6C8; sticky; top: 60px; z-index: 100; }
        nav button { flex: 1; padding: 16px; border: none; background: none; font-weight: 600; color: #8E8E93; font-size: 0.9rem; }
        nav button.active { color: var(--dabelle-blue); border-bottom: 3px solid var(--dabelle-gold); }

        .view { display: none; padding: 20px; padding-bottom: 180px; }
        .view.active { display: block; animation: fadeIn 0.3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .card { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        label { font-size: 0.7rem; font-weight: 700; color: #8E8E93; margin-bottom: 5px; display: block; text-transform: uppercase; }
        input, select { width: 100%; height: 50px; border-radius: 12px; border: 1px solid #E5E5EA; padding: 0 15px; font-size: 1rem; margin-bottom: 10px; background: #F9F9FB; font-weight: 600; }

        .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 8px; }

        /* Estilo Coleta */
        .comp-area { background: #F2F2F7; border-radius: 14px; padding: 12px; margin-top: 10px; }
        .comp-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .comp-input { width: 90px !important; height: 38px !important; margin: 0 !important; text-align: right; font-size: 0.9rem !important; }

        /* Estilo Dash */
        .metrics { display: flex; gap: 10px; margin-bottom: 15px; }
        .m-card { flex: 1; background: var(--dabelle-blue); color: white; padding: 15px; border-radius: 18px; text-align: center; }
        .m-card b { display: block; font-size: 1.3rem; color: var(--dabelle-gold); }

        .history-item { 
            padding: 15px 0; border-bottom: 1px solid #F2F2F7; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .btn-wa-small { background: #25D366; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; }

        .footer-save {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 25px calc(20px + env(safe-area-inset-bottom));
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
            border-top: 0.5px solid #C6C6C8; z-index: 1000;
        }
        .btn-save { width: 100%; height: 56px; background: var(--dabelle-blue); color: white; border: none; border-radius: 16px; font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1>DutyPrice</h1>
    <span class="version-tag">2.1v</span>
</header>

<nav>
    <button id="tab-collect" class="active" onclick="switchTab('collect')">COLETA</button>
    <button id="tab-dash" onclick="switchTab('dash')">DASHBOARD</button>
</nav>

<div id="view-collect" class="view active">
    <div class="card">
        <label>Nome da Loja</label>
        <input type="text" id="store-name" placeholder="Ex: Assaí Torquato">
        
        <div class="grid-3">
            <div><label>Bairro</label><input type="text" id="store-bairro" placeholder="Bairro"></div>
            <div><label>Cidade</label><input type="text" id="store-city" value="Manaus"></div>
            <div><label>UF</label><input type="text" id="store-uf" value="AM"></div>
        </div>

        <label>Canal</label>
        <select id="store-channel">
            <option value="C&C">C&C</option>
            <option value="Tradicional">Tradicional</option>
            <option value="1-4 ckt">1-4 ckt</option>
            <option value="10+ ckt">10+ ckt</option>
        </select>
    </div>
    <div id="product-list"></div>
</div>

<div id="view-dash" class="view">
    <div class="metrics">
        <div class="m-card">Visitas<b id="d-visitas">0</b></div>
        <div class="m-card">Média DaBelle<b id="d-media">R$ 0,00</b></div>
    </div>

    <div class="card" id="pdf-area">
        <canvas id="chartCanal" height="180"></canvas>
        <div id="history-log" style="margin-top:20px;"></div>
    </div>

    <div class="card">
        <label>Relatório do Período</label>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <input type="date" id="date-start" onchange="renderDashboard()">
            <input type="date" id="date-end" onchange="renderDashboard()">
        </div>
        <button class="btn-save" style="background:#E5E5EA; color:#333; height:45px; font-size:0.9rem;" onclick="exportPDF()">Gerar PDF Completo</button>
    </div>
    
    <button onclick="clearAll()" style="width:100%; color:red; background:none; border:none; padding:15px; font-size:0.7rem;">LIMPAR TUDO</button>
</div>

<div class="footer-save" id="footer-save">
    <button class="btn-save" onclick="saveVisit()">SALVAR VISITA</button>
</div>

<script>
    const inventory = [
        { cat: "Kits", prod: "DABELLE - KIT SH+COND - 425ML", comps: ["Elseve", "Pantene", "Lola", "Salon Line"] },
        { cat: "Cremes", prod: "DABELLE - CREME DE PENTEAR - 270G", comps: ["Elseve", "Pantene", "Salon Line", "Skala"] },
        { cat: "Máscaras", prod: "DABELLE - MASCARA - 400G", comps: ["Elseve", "Novex", "Lola"] },
        { cat: "Óleos", prod: "DABELLE - OLEO EM CREME - 190ML", comps: ["Elseve", "Amend"] },
        { cat: "Tratamento", prod: "DABELLE - CPP JUJUBA - 1KG", comps: ["Skala", "Salon Line"] },
        { cat: "Gelatina", prod: "DABELLE - GELATINA - 500G", comps: ["Salon Line", "Lola"] }
    ];

    let myChart = null;

    function init() {
        const container = document.getElementById('product-list');
        container.innerHTML = inventory.map((item, idx) => `
            <div class="card">
                <small style="color:var(--dabelle-gold); font-weight:800;">${item.cat}</small>
                <h2 style="font-size:0.95rem; margin:5px 0;">${item.prod}</h2>
                <input type="tel" class="db-price" placeholder="R$ 0,00" data-name="${item.prod}" oninput="m(this)">
                <div class="comp-area">
                    ${item.comps.map((c, cIdx) => `
                        <div class="comp-row">
                            <span style="font-size:0.8rem;">${c}</span>
                            <input type="tel" class="comp-price" data-name="${c}" placeholder="0,00" oninput="m(this)">
                        </div>
                    `).join('')}
                </div>
            </div>
        `).join('');
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-start').value = today;
        document.getElementById('date-end').value = today;
    }

    function m(i) {
        let v = i.value.replace(/\D/g, "");
        if (v === "") return;
        i.value = (parseFloat(v)/100).toLocaleString('pt-BR', {minimumFractionDigits:2});
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.getElementById(`tab-${t}`).classList.add('active');
        document.getElementById('footer-save').style.display = (t === 'collect') ? 'block' : 'none';
        if(t === 'dash') renderDashboard();
    }

    function saveVisit() {
        const store = document.getElementById('store-name').value;
        if(!store) return alert("Nome da loja vazio!");

        const entries = [];
        document.querySelectorAll('.db-price').forEach((input, i) => {
            if(input.value) {
                const comps = [];
                const compInputs = input.parentElement.querySelectorAll('.comp-price');
                compInputs.forEach(ci => { if(ci.value) comps.push({ name: ci.dataset.name, price: ci.value }); });
                entries.push({ prod: input.dataset.name, price: input.value, comps });
            }
        });

        const visit = {
            id: Date.now(),
            store,
            bairro: document.getElementById('store-bairro').value,
            city: document.getElementById('store-city').value,
            uf: document.getElementById('store-uf').value,
            channel: document.getElementById('store-channel').value,
            date: new Date().toISOString().split('T')[0],
            displayDate: new Date().toLocaleDateString('pt-BR'),
            data: entries
        };

        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        db.push(visit);
        localStorage.setItem('dutyprice_db', JSON.stringify(db));
        alert("Pesquisa salva!");
        location.reload();
    }

    function renderDashboard() {
        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        const start = document.getElementById('date-start').value;
        const end = document.getElementById('date-end').value;
        const filtered = db.filter(v => v.date >= start && v.date <= end);
        
        document.getElementById('d-visitas').innerText = filtered.length;
        let sum = 0, count = 0, canais = {};
        
        filtered.forEach(v => {
            canais[v.channel] = (canais[v.channel] || 0) + 1;
            v.data.forEach(p => { sum += parseFloat(p.price.replace('.','').replace(',','.')); count++; });
        });

        document.getElementById('d-media').innerText = `R$ ${(count > 0 ? sum/count : 0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        
        document.getElementById('history-log').innerHTML = filtered.slice().reverse().map(h => `
            <div class="history-item">
                <div style="flex:1">
                    <b>${h.store}</b><br>
                    <small>${h.bairro} | ${h.city}-${h.uf}</small>
                </div>
                <button class="btn-wa-small" onclick="shareStoreWA(${h.id})">ENVIAR WHATSAPP</button>
            </div>
        `).join('') || "Sem registros.";

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('chartCanal').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(canais), datasets: [{ data: Object.values(canais), backgroundColor: ['#051937','#C5A059','#004d7a'] }] },
            options: { plugins: { legend: { position:'bottom' } } }
        });
    }

    function shareStoreWA(id) {
        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        const h = db.find(x => x.id === id);
        let text = `*DUTYPRICE - RELATÓRIO DE LOJA*\n\n🏪 *Loja:* ${h.store}\n📍 *Bairro:* ${h.bairro}\n🌆 *Cidade:* ${h.city}-${h.uf}\n🏢 *Canal:* ${h.channel}\n📅 *Data:* ${h.displayDate}\n\n*COMPARATIVO DE PREÇOS:*\n`;
        
        h.data.forEach(p => {
            text += `\n*${p.prod}*\n💰 DaBelle: R$ ${p.price}\n`;
            p.comps.forEach(c => text += `🔹 ${c.name}: R$ ${c.price}\n`);
        });
        
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function exportPDF() {
        const element = document.getElementById('pdf-area');
        html2pdf().set({ margin:10, filename:'DutyPrice_Relatorio.pdf', html2canvas:{scale:2}, jsPDF:{unit:'mm', format:'a4'} }).from(element).save();
    }

    function clearAll() { if(confirm("Apagar tudo?")) { localStorage.removeItem('dutyprice_db'); location.reload(); } }
    window.onload = init;
</script>
</body>
</html>
