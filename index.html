<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriceScout v2.8</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055644.png">

    <style>
        :root {
            --bg: #0a0a0f; --card: rgba(26, 26, 38, 0.9); --accent: #00e5ff;
            --text: #fff; --sub: #a0a0ab; --border: #2e2e42;
            
            /* Cores expandidas para concorrência (v2.8) */
            --br-dabelle: #e91e8c; --br-salonline: #ff6b35; --br-elseve: #3b82f6;
            --br-ox: #8b5cf6; --br-loreal: #f59e0b; --br-dove: #06b6d4; --br-pantene: #10b981;
            --br-niely: #ffd700; --br-novex: #ff4500; --br-seda: #ff1493;
            --br-palmolive: #32cd32; --br-kolene: #ba55d3; --br-tresemme: #ffffff;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            margin: 0; padding: 15px 15px 120px 15px; box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }
        
        /* Header Nativo v2.8 */
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo { font-weight: 900; font-size: 24px; color: var(--accent); letter-spacing: -1px;}
        .v-tag { font-size: 10px; background: #333; padding: 3px 7px; border-radius: 6px; margin-left: 10px; vertical-align: middle; color: #aaa; font-weight: 400;}

        /* Glassmorphism Cards v2.8 */
        .card {
            background: var(--card); border-radius: 20px; padding: 18px;
            margin-bottom: 15px; border: 1px solid var(--border);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        /* iOS Style Buttons v2.8 */
        .btn {
            background: var(--accent); color: #000; border: none; border-radius: 14px;
            padding: 16px; font-weight: 700; width: 100%; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            -webkit-appearance: none; transition: background 0.2s;
        }
        .btn:active { background: #00b8cc; }
        .btn:disabled { opacity: 0.3; }
        
        /* Inputs Elegantes v2.8 */
        input, select {
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: #fff;
            padding: 15px; border-radius: 12px; width: 100%; margin-bottom: 12px;
            box-sizing: border-box; font-size: 16px; -webkit-appearance: none;
        }
        input:focus { border-color: var(--accent); outline: none;}

        /* Seção API Key Visível */
        .api-section { border: 1px solid #444; }
        .key-status { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; margin-bottom: 12px;}

        /* Preview e Loader */
        #preview { width: 100%; height: 240px; object-fit: cover; border-radius: 16px; display: none; margin-bottom: 15px; border: 2px solid var(--border); }
        #loader { display: none; text-align: center; margin: 25px 0; }
        .p-bar { height: 5px; background: var(--border); overflow: hidden; border-radius: 3px; margin-top: 10px; }
        .p-fill { height: 100%; background: var(--accent); width: 40%; animation: load v2.8 1.4s infinite ease-in-out; }
        @keyframes load v2.8 { from { transform: translateX(-100%); } to { transform: translateX(250%); } }

        /* Listagem de Produtos v2.8 - Suporte a múltiplos preços */
        .prod-item {
            background: rgba(30, 30, 45, 0.5); padding: 14px; border-radius: 12px;
            margin-bottom: 10px; border-left: 5px solid #555;
            display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px;
        }
        .price-box { text-align: right; }
        .price-atk { font-weight: 800; font-size: 19px; }
        .price-var { font-size: 13px; color: var(--sub); }

        /* Nav Inferior Estilo iOS v2.8 */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 90px;
            background: rgba(20, 20, 30, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: flex; border-top: 1px solid var(--border);
            padding-bottom: env(safe-area-inset-bottom); box-sizing: border-box; z-index: 1000;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--sub); font-size: 11px; text-decoration: none; font-weight: 500;}
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PriceScout<span class="v-tag">v2.8 Atacarejo</span></div>
    </header>

    <div id="view-capture">
        
        <div class="card api-section">
            <div class="key-status" id="key-status-msg">🔴 API Key do Google AI Não Configurada</div>
            <input type="password" id="api-key-input" placeholder="Cole sua Gemini Key aqui" oninput="validateKeyField()">
            <div style="font-size: 11px; color: #888; margin-top: -5px;">Necessária para ler preços em aistudio.google.com</div>
        </div>

        <img id="preview">

        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn" onclick="openMedia('camera')">📸 Câmera</button>
                <button class="btn" style="background:#2e2e42; color:#fff" onclick="openMedia('file')">📁 Galeria</button>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
        </div>

        <div class="card">
            <input type="text" id="field-store" placeholder="Loja / Bairro (ex: Atack Coroado)">
            <button onclick="askLocation()" style="background:none; border:none; color:var(--accent); font-size:14px; font-weight:bold; padding:5px 0; width:100%; text-align:left;">📍 Localização Automática</button>
        </div>

        <div id="loader">
            <small id="status-msg" style="color:var(--accent)">Analisando etiquetas de preço...</small>
            <div class="p-bar"><div class="p-fill"></div></div>
        </div>

        <div id="results-area"></div>

        <button class="btn" id="btn-analyze" style="display:none; margin-top:15px; background:var(--br-pantene);" onclick="startAnalysis()" disabled>Analisar Preços Gôndola</button>
    </div>

    <nav>
        <a href="#" class="nav-item active"><span class="nav-icon">📷</span>Capturar</a>
        <a href="#" class="nav-item"><span class="nav-icon">📊</span>Mercado</a>
        <a href="#" class="nav-item"><span class="nav-icon">📜</span>Histórico</a>
    </nav>

    <script>
        // Cores Expandidas Concorrência v2.8
        const MARCAS = {
            'Dabelle': '#e91e8c', 'Salon Line': '#ff6b35', 'Elseve': '#3b82f6', 'OX': '#8b5cf6', "L'Oréal": '#f59e0b', 'Dove': '#06b6d4', 'Pantene': '#10b981',
            'Niely Gold': '#ffd700', 'Novex': '#ff4500', 'Seda': '#ff1493', 'Palmolive': '#32cd32', 'Kolene': '#ba55d3', 'Tresemmé': '#ffffff'
        };
        let currentImageBase64 = null;

        // Recupera chave salva ao carregar
        window.onload = () => {
            const savedKey = localStorage.getItem('ps_api_key');
            if (savedKey) {
                document.getElementById('api-key-input').value = savedKey;
            }
            validateKeyField();
        };

        function validateKeyField() {
            const key = document.getElementById('api-key-input').value.trim();
            const statusMsg = document.getElementById('key-status-msg');
            const btnAnalyze = document.getElementById('btn-analyze');

            if (key.length > 30) {
                statusMsg.innerHTML = "🟢 Chave Configurada";
                statusMsg.style.color = "#00ff00";
                localStorage.setItem('ps_api_key', key);
                btnAnalyze.disabled = false;
            } else {
                statusMsg.innerHTML = "🔴 Chave de API Não Configurada";
                statusMsg.style.color = "#ff4444";
                btnAnalyze.disabled = true;
            }
        }

        function openMedia(type) {
            const input = document.getElementById('file-input');
            if(type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }

        document.getElementById('file-input').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    // Compressão v2.8 para Atacarejo (detalhe vs peso)
                    const canvas = document.createElement('canvas');
                    const MAX = 1200; // Aumentado levemente para ler etiquetas duplas
                    let w = img.width, h = img.height;
                    if (w > MAX) { h *= MAX / w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    
                    document.getElementById('preview').src = canvas.toDataURL('image/jpeg');
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('btn-analyze').style.display = 'flex';
                    document.getElementById('results-area').innerHTML = '';
                };
            };
            reader.readAsDataURL(file);
        };

        // Inteligência de Detecção v2.8 (Suporte Atacado e Concorrência)
        async function startAnalysis() {
            const key = document.getElementById('api-key-input').value.trim();
            const btn = document.getElementById('btn-analyze');
            const loader = document.getElementById('loader');
            const statusMsg = document.getElementById('status-msg');

            loader.style.display = 'block';
            btn.disabled = true;
            statusMsg.innerText = "Lendo preços de Atacado/Varejo...";

            const modelos = ['gemini-1.5-flash', 'gemini-1.5-flash-8b'];
            
            // Prompt v2.8: Detecção dupla de preços e foco em concorrência
            const prompt = `Retorne EXCLUSIVAMENTE um JSON: {"produtos":[{"marca":"","nome":"","preco_atacado":0.00,"preco_varejo":0.00,"e_kit":false,"e_promo":false}]}. Extraia todos os produtos e os dois preços da etiqueta (se houver) das marcas: Dabelle, Salon Line, Elseve, OX, L'Oréal, Dove, Pantene, Niely Gold, Novex, Seda, Palmolive, Kolene. Identifique se é kit ou individual.`;

            let sucesso = false;
            for (let m of modelos) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: currentImageBase64}}]}] })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(`${data.error.code}`);

                    let rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);
                    renderResults(cleanJson.produtos);
                    sucesso = true;
                    break;

                } catch (err) { console.error(`Erro ${m}`, err); }
            }

            loader.style.display = 'none';
            btn.disabled = false;
            if(!sucesso) alert("Não consegui ler os preços. Tente uma foto mais próxima das etiquetas.");
        }

        function renderResults(produtos) {
            const area = document.getElementById('results-area');
            area.innerHTML = `<h3 style="margin: 15px 0 10px 0; font-weight:800;">Radar de Preços (${produtos.length})</h3>`;
            
            if (produtos.length === 0) {
                area.innerHTML += `<div style="color:#aaa; text-align:center; padding: 20px;">Nenhum preço lido na gôndola.</div>`;
                return;
            }

            produtos.forEach(p => {
                const cor = MARCAS[p.marca] || '#888';
                const pAtk = p.preco_atacado ? `R$ ${p.preco_atacado.toFixed(2)}` : "-";
                const pVar = p.preco_varejo ? `Var: R$ ${p.preco_varejo.toFixed(2)}` : "Var: -";
                const badgePromo = p.e_promo ? '<span style="color:#ff4444; font-size:10px; font-weight:bold; margin-left:5px;">PROMO</span>' : '';
                const kitTxt = p.e_kit ? ' [Kit]' : '';

                area.innerHTML += `
                    <div class="prod-item" style="border-left-color: ${cor}">
                        <div>
                            <div style="font-weight:700; color:${cor}; font-size:15px;">${p.marca}${kitTxt}</div>
                            <div style="font-size:12px; color:#aaa">${p.nome} ${badgePromo}</div>
                        </div>
                        <div class="price-box">
                            <div class="price-atk">${pAtk} <span style="font-size:10px; font-weight:400; color:#aaa;">Atk</span></div>
                            <div class="price-var">${pVar}</div>
                        </div>
                    </div>`;
            });
            document.getElementById('btn-analyze').style.display = 'none';
        }

        // Geolocalização
        function askLocation() {
            if (!navigator.geolocation) return alert("GPS não suportado.");
            navigator.geolocation.getCurrentPosition(async p => {
                try {
                    const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                    const d = await r.json();
                    const bairro = d.address.suburb || d.address.neighbourhood || "";
                    document.getElementById('field-store').value = bairro ? `${bairro} (Manaus)` : "Manaus";
                } catch(e) { document.getElementById('field-store').value = "Manaus"; }
            }, () => alert("Ative o GPS nas configurações do Safari."));
        }
    </script>
</body>
</html>
