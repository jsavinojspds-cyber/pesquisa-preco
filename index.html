<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PriceScout v4.2 Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0f; color: #e2e8f0; font-family: -apple-system, system-ui, sans-serif; }
        .accent-cyan { color: #00e5ff; }
        .bg-cyan { background-color: #00e5ff; }
        .card { background: #16161e; border: 1px solid #27272a; border-radius: 12px; }
        .loader { border-top-color: #00e5ff; animation: spinner 0.6s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; transition: all 0.3s; }
        input:focus { outline: none; border-color: #00e5ff; }
    </style>
</head>
<body class="p-4 pb-20">

    <header class="mb-6">
        <div class="flex justify-center items-center gap-2 mb-4">
            <h1 class="text-2xl font-bold accent-cyan">PriceScout</h1>
            <span class="bg-cyan text-black text-[10px] font-black px-2 py-1 rounded">v4.2 ULTRA</span>
        </div>
        
        <div class="card p-4">
            <div class="flex justify-between items-center mb-2 text-[10px] uppercase font-bold tracking-widest text-gray-500">
                <span>Gemini API Key</span>
                <div id="apiStatus" class="flex items-center gap-2">
                    <span id="statusDot" class="status-dot bg-gray-700"></span>
                    <span id="statusText">Aguardando...</span>
                </div>
            </div>
            <div class="flex gap-2">
                <input type="password" id="apiKey" placeholder="Cole sua chave aqui..." 
                    class="flex-1 bg-black border border-gray-700 rounded-lg p-3 text-cyan-400 text-sm">
                <button onclick="checkApi()" class="bg-cyan text-black px-3 rounded-lg text-[10px] font-bold active:opacity-70 transition-colors">
                    VERIFICAR
                </button>
            </div>
        </div>
    </header>

    <main class="space-y-4">
        <div class="card p-6 text-center border-dashed border-2 border-gray-800">
            <input type="file" id="cameraInput" accept="image/*" class="hidden">
            <button onclick="document.getElementById('cameraInput').click()" 
                class="w-full bg-white text-black font-bold py-4 rounded-xl flex flex-col items-center justify-center gap-1 active:scale-95 transition-transform">
                <span class="text-lg">📷 SELECIONAR FOTO</span>
                <span class="text-[10px] opacity-70 uppercase">Câmera ou Galeria</span>
            </button>
            <p id="fileName" class="text-xs text-gray-500 mt-2 italic truncate px-4"></p>
        </div>

        <button id="analyzeBtn" disabled onclick="analyzeImage()" 
            class="w-full bg-gray-800 text-gray-400 font-bold py-4 rounded-xl opacity-50 cursor-not-allowed transition-all">
            ANALISAR PREÇOS
        </button>

        <div id="loading" class="hidden flex flex-col items-center py-8">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-12 w-12 mb-4"></div>
            <p class="accent-cyan animate-pulse text-sm font-bold">Lendo preços em Manaus...</p>
        </div>

        <div id="resultsContainer" class="hidden space-y-4">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-[10px] font-black uppercase tracking-widest text-gray-400">Dados Extraídos</h2>
                <button onclick="copyToWhatsApp()" class="text-[10px] bg-green-600 text-white px-4 py-2 rounded-full font-bold uppercase shadow-lg shadow-green-900/20">
                    WhatsApp
                </button>
            </div>
            <div id="resultsList" class="card divide-y divide-gray-800"></div>
        </div>
    </main>

    <canvas id="canvas" class="hidden"></canvas>

    <script>
        let compressedImageBase64 = null;
        let isApiValid = false;

        async function checkApi() {
            // Remove espaços extras que podem vir ao colar
            const keyInput = document.getElementById('apiKey');
            const key = keyInput.value.trim();
            keyInput.value = key; 

            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (!key) { alert("A chave está vazia!"); return; }

            text.innerText = "Validando...";
            
            try {
                // Tenta uma requisição de metadados do modelo para validar a chave
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash?key=${key}`);
                const data = await res.json();

                if (res.ok && !data.error) {
                    isApiValid = true;
                    dot.className = "status-dot bg-green-500 shadow-[0_0_10px_#00e5ff]";
                    text.innerText = "Chave Ativa";
                    text.style.color = "#00e5ff";
                    updateAnalyzeButton();
                } else {
                    throw new Error(data.error?.message || "Erro desconhecido");
                }
            } catch (e) {
                isApiValid = false;
                dot.className = "status-dot bg-red-600 shadow-[0_0_10px_#ef4444]";
                text.innerText = "Inválida";
                text.style.color = "#ef4444";
                console.error(e);
            }
        }

        function updateAnalyzeButton() {
            const btn = document.getElementById('analyzeBtn');
            if (isApiValid && compressedImageBase64) {
                btn.disabled = false;
                btn.className = "w-full bg-[#00e5ff] text-black font-black py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-cyan-500/20";
            }
        }

        document.getElementById('cameraInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileName').innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    let width = img.width;
                    let height = img.height;
                    const max_size = 1000;

                    if (width > height && width > max_size) { height *= max_size / width; width = max_size; }
                    else if (height > max_size) { width *= max_size / height; height = max_size; }

                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    compressedImageBase64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                    updateAnalyzeButton();
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        async function analyzeImage() {
            const key = document.getElementById('apiKey').value;
            const loading = document.getElementById('loading');
            const resultsContainer = document.getElementById('resultsContainer');
            
            loading.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            document.getElementById('analyzeBtn').disabled = true;

            const payload = {
                contents: [{
                    parts: [
                        { text: "Extraia Marca, Item e Preço: Dabelle, Salon Line, Elseve, Novex, Seda, Niely, Dove, Pantene. Formato: [Marca] [Item] - R$ [Preço]. Ignore promoções de quantidade e fotos borradas." },
                        { inline_data: { mime_type: "image/jpeg", data: compressedImageBase64 } }
                    ]
                }],
                safetySettings: [
                    { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_SEXUALLY_EXPLICIT", threshold: "BLOCK_NONE" },
                    { category: "HARM_CATEGORY_DANGEROUS_CONTENT", threshold: "BLOCK_NONE" }
                ],
                generationConfig: { temperature: 0.1 }
            };

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                const list = document.getElementById('resultsList');
                list.innerHTML = text.trim().split('\n').map(line => `
                    <div class="p-4 text-sm font-semibold border-b border-gray-800 last:border-0">${line}</div>
                `).join('');

                resultsContainer.classList.remove('hidden');
            } catch (error) {
                alert('Erro na extração. Verifique se a foto está nítida.');
            } finally {
                loading.classList.add('hidden');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function copyToWhatsApp() {
            const items = Array.from(document.querySelectorAll('#resultsList div')).map(d => d.innerText).join('\n');
            window.open(`https://wa.me/?text=${encodeURIComponent("*PRICESCOUT v4.2*\n\n" + items)}`, '_blank');
        }
    </script>
</body>
</html>
