<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriceScout v2.9 Focus</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --accent: #00e5ff; --text: #fff; --border: #2e2e42; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 15px 15px 100px 15px; }
        
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo { font-weight: 800; font-size: 22px; color: var(--accent); }
        .v-tag { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; margin-left: 8px; color: #aaa; }

        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 15px; border: 1px solid var(--border); }
        .btn { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 16px; font-weight: 700; width: 100%; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:disabled { opacity: 0.4; }
        
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 14px; border-radius: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }

        #preview { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; display: none; margin-bottom: 15px; border: 2px solid var(--border); }
        
        #loader { display: none; text-align: center; margin: 20px 0; }
        .p-bar { height: 4px; background: var(--border); overflow: hidden; border-radius: 2px; margin-top: 8px; }
        .p-fill { height: 100%; background: var(--accent); width: 30%; animation: load 1.2s infinite ease-in-out; }
        @keyframes load { from { transform: translateX(-100%); } to { transform: translateX(300%); } }

        .prod-item { 
            background: #1f1f2e; padding: 14px; border-radius: 12px; margin-bottom: 8px; 
            display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent);
        }
        .prod-info { flex: 1; padding-right: 10px; }
        .prod-name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
        .prod-brand { font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; }
        .prod-price { font-weight: 800; font-size: 18px; white-space: nowrap; }

        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #16161e; display: flex; border-top: 1px solid var(--border); padding-bottom: 15px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PriceScout<span class="v-tag">v2.9 Focus</span></div>
    </header>

    <div id="capture-area">
        <div class="card">
            <small style="color: var(--accent); font-weight: bold; display: block; margin-bottom: 8px;">CHAVE DE API</small>
            <input type="password" id="api-key" placeholder="Insira sua Gemini API Key">
        </div>

        <img id="preview">

        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn" onclick="takeMedia('camera')">📸 Câmera</button>
                <button class="btn" style="background:#2e2e42; color:#fff" onclick="takeMedia('file')">📁 Galeria</button>
            </div>
            <input type="file" id="file-in" hidden accept="image/*">
        </div>

        <div id="loader">
            <small id="status-msg" style="color:var(--accent)">Lendo gôndola...</small>
            <div class="p-bar"><div class="p-fill"></div></div>
        </div>

        <div id="results"></div>

        <button class="btn" id="btn-go" style="display:none; margin-top:15px;" onclick="run()">Analisar Preços</button>
    </div>

    <nav>
        <a href="#" class="nav-item active"><span>📷</span>Capturar</a>
        <a href="#" class="nav-item"><span>📊</span>Dash</a>
        <a href="#" class="nav-item"><span>📜</span>Histórico</a>
    </nav>

    <script>
        let base64Img = null;

        // Auto-load API Key
        window.onload = () => {
            const k = localStorage.getItem('ps_key');
            if(k) document.getElementById('api-key').value = k;
        };

        function takeMedia(type) {
            const input = document.getElementById('file-in');
            if(type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }

        document.getElementById('file-in').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h *= MAX/w; w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    base64Img = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
                    const pre = document.getElementById('preview');
                    pre.src = canvas.toDataURL('image/jpeg');
                    pre.style.display = 'block';
                    document.getElementById('btn-go').style.display = 'flex';
                    document.getElementById('results').innerHTML = '';
                };
            };
            reader.readAsDataURL(file);
        };

        async function run() {
            const key = document.getElementById('api-key').value.trim();
            if(!key) return alert("Por favor, insira sua API Key");
            localStorage.setItem('ps_key', key);

            const btn = document.getElementById('btn-go');
            const loader = document.getElementById('loader');
            loader.style.display = 'block';
            btn.disabled = true;

            const prompt = `Retorne EXCLUSIVAMENTE um JSON: {"produtos":[{"marca":"","item":"","preco":0.00}]}. Liste todos os produtos e seus preços individuais visíveis na imagem. Marcas: Dabelle, Salon Line, Elseve, OX, L'Oréal, Dove, Pantene, Niely, Novex, Seda, Kolene.`;

            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64Img}}]}] })
                });

                const data = await res.json();
                let txt = data.candidates[0].content.parts[0].text;
                const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);
                
                const area = document.getElementById('results');
                area.innerHTML = `<h3 style="margin:20px 0 10px 0">Preços Detectados</h3>`;
                
                json.produtos.forEach(p => {
                    area.innerHTML += `
                        <div class="prod-item">
                            <div class="prod-info">
                                <div class="prod-brand">${p.marca}</div>
                                <div class="prod-name">${p.item}</div>
                            </div>
                            <div class="prod-price">R$ ${p.preco.toFixed(2)}</div>
                        </div>`;
                });
                btn.style.display = 'none';

            } catch (err) {
                alert("Erro ao ler preços. Verifique sua chave ou a nitidez da foto.");
                console.error(err);
            }
            loader.style.display = 'none';
            btn.disabled = false;
        }
    </script>
</body>
</html>
