<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriceScout v2.6</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00e5ff">
    <style>
        :root { --bg: #0a0a0f; --card: #16161e; --accent: #00e5ff; --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 85px 16px 100px 16px; }
        header { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: rgba(10,10,15,0.9); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 1000; border-bottom: 1px solid #1f1f2e; }
        .logo { font-weight: 800; font-size: 20px; color: var(--accent); }
        .v-tag { font-size: 9px; background: #333; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #1f1f2e; }
        .btn { background: var(--accent); color: #000; border: none; border-radius: 12px; padding: 15px; font-weight: 700; width: 100%; font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        #preview { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; display: none; margin-bottom: 15px; border: 2px solid #1f1f2e; }
        input { background: #000; border: 1px solid #2e2e42; color: #fff; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 10px; box-sizing: border-box; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; height: 80px; background: #16161e; display: flex; border-top: 1px solid #1f1f2e; padding-bottom: 15px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; font-size: 10px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }
        #loader { display: none; text-align: center; margin: 15px 0; }
        .progress-bar { height: 3px; background: #1f1f2e; overflow: hidden; margin-top: 8px; border-radius: 2px; }
        .progress-fill { height: 100%; background: var(--accent); width: 30%; animation: move 1.2s infinite; }
        @keyframes move { from { transform: translateX(-100%); } to { transform: translateX(300%); } }
        #api-panel { position: fixed; top: 80px; left: 16px; right: 16px; background: #1c1c26; border: 1px solid var(--accent); border-radius: 15px; padding: 20px; z-index: 2000; display: none; }
        .brand-badge { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; display: inline-block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PriceScout<span class="v-tag">v2.6</span></div>
        <button onclick="toggleApi()" style="background:none; border:none; font-size:20px;">🔑</button>
    </header>

    <div id="api-panel">
        <h4 style="margin:0 0 10px 0">API Key (Google AI Studio)</h4>
        <input type="password" id="api-key" value="AIzaSyCe3EoWX3-QFWU21VYvN2L8T03pWelgmAY">
        <button class="btn" onclick="toggleApi()">Confirmar</button>
        <p style="font-size:10px; color:#888; margin-top:10px;">Obtenha uma chave gratuita em: aistudio.google.com</p>
    </div>

    <div id="capture-view">
        <img id="preview">
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn" onclick="document.getElementById('f').setAttribute('capture','environment');document.getElementById('f').click()">📸 Foto</button>
                <button class="btn" style="background:#2e2e42; color:#fff" onclick="document.getElementById('f').removeAttribute('capture');document.getElementById('f').click()">📁 Galeria</button>
            </div>
            <input type="file" id="f" hidden accept="image/*">
        </div>

        <div class="card">
            <input type="text" id="store" placeholder="Loja/Bairro (Manaus)">
            <button onclick="getGeo()" style="background:none; border:none; color:var(--accent); font-size:12px; margin-bottom:10px; width:100%; text-align:left;">📍 Localização Automática</button>
        </div>

        <div id="loader">
            <small id="status-msg" style="color:var(--accent)">Comprimindo imagem...</small>
            <div class="progress-bar"><div class="progress-fill"></div></div>
        </div>

        <div id="results"></div>
        <button class="btn" id="go" style="display:none; margin-top:10px;" onclick="analyze()">Analisar Gôndola</button>
    </div>

    <nav>
        <a href="#" class="nav-item active"><span>📷</span>Captura</a>
        <a href="#" class="nav-item"><span>📊</span>Dash</a>
        <a href="#" class="nav-item"><span>📜</span>Histórico</a>
    </nav>

    <script>
        const BRANDS = { 'Dabelle': '#e91e8c', 'Salon Line': '#ff6b35', 'Elseve': '#3b82f6', 'OX': '#8b5cf6', "L'Oréal": '#f59e0b', 'Dove': '#06b6d4', 'Pantene': '#10b981' };
        let imgData = null;

        function toggleApi() { const p = document.getElementById('api-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

        document.getElementById('f').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const img = new Image();
                img.src = ev.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const max = 1024;
                    let w = img.width, h = img.height;
                    if (w > max) { h *= max / w; w = max; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    imgData = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];
                    document.getElementById('preview').src = canvas.toDataURL('image/jpeg');
                    document.getElementById('preview').style.display = 'block';
                    document.getElementById('go').style.display = 'flex';
                };
            };
            reader.readAsDataURL(file);
        };

        async function analyze() {
            const key = document.getElementById('api-key').value.trim();
            const btn = document.getElementById('go');
            const msg = document.getElementById('status-msg');
            document.getElementById('loader').style.display = 'block';
            btn.disabled = true;

            const models = ['gemini-1.5-flash', 'gemini-1.5-flash-8b', 'gemini-2.0-flash-exp'];
            const prompt = `Retorne um JSON purista: {"produtos":[{"marca":"","linha":"","tipo":"","preco":0.00,"promocao":false}]}. Foco em: Dabelle, Salon Line, Elseve, OX, L'Oréal, Dove, Pantene.`;

            let ok = false;
            for(let m of models) {
                msg.innerText = `Consultando ${m}...`;
                try {
                    const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: imgData}}]}] })
                    });
                    const d = await r.json();
                    if(d.error) throw new Error(`${d.error.code}: ${d.error.message}`);

                    let txt = d.candidates[0].content.parts[0].text;
                    const json = JSON.parse(txt.match(/\{[\s\S]*\}/)[0]);
                    render(json.produtos);
                    ok = true; break;
                } catch(err) { 
                    console.error(err);
                    msg.innerText = `Erro no ${m}. Tentando próximo...`;
                }
            }

            document.getElementById('loader').style.display = 'none';
            btn.disabled = false;
            if(!ok) alert("Falha total. Verifique se sua API Key tem créditos ou se a imagem está clara.");
        }

        function render(items) {
            const res = document.getElementById('results');
            res.innerHTML = `<h4 style="margin:15px 0">Detectados (${items.length})</h4>`;
            items.forEach(p => {
                const c = BRANDS[p.marca] || '#888';
                res.innerHTML += `
                    <div style="background:#1f1f2e; padding:12px; border-radius:10px; margin-bottom:8px; border-left:4px solid ${c}; display:flex; justify-content:space-between; align-items:center">
                        <div>
                            <span class="brand-badge" style="background:${c}; color:#fff">${p.marca}</span>
                            <div style="font-size:12px; color:#aaa">${p.linha} ${p.tipo}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-weight:800; font-size:16px">R$ ${p.preco.toFixed(2)}</div>
                            ${p.promocao ? '<span style="color:red; font-size:10px; font-weight:bold">PROMO</span>' : ''}
                        </div>
                    </div>`;
            });
            document.getElementById('go').style.display = 'none';
        }

        async function getGeo() {
            navigator.geolocation.getCurrentPosition(async p => {
                const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                const d = await r.json();
                document.getElementById('store').value = d.address.suburb || d.address.neighbourhood || "Manaus";
            });
        }
    </script>
</body>
</html>
