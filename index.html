<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DutyPrice 1.5v</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --dabelle-blue: #002D58;
            --dabelle-gold: #C5A059;
            --ios-bg: #F2F2F7;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }

        body {
            background-color: var(--ios-bg);
            margin: 0;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
            color: #1C1C1E;
        }

        header {
            background: var(--dabelle-blue); color: white; padding: 18px; 
            text-align: center; position: relative;
        }

        .version-tag { 
            font-size: 0.6rem; background: rgba(255,255,255,0.15); 
            padding: 3px 10px; border-radius: 20px; position: absolute; top: 18px; right: 20px; 
        }

        nav { display: flex; background: var(--white); border-bottom: 0.5px solid #C6C6C8; position: sticky; top: 0; z-index: 100; }
        nav button { flex: 1; padding: 16px; border: none; background: none; font-weight: 600; color: #8E8E93; font-size: 0.95rem; }
        nav button.active { color: var(--dabelle-blue); border-bottom: 3px solid var(--dabelle-gold); }

        .view { display: none; padding: 20px; padding-bottom: 180px; }
        .view.active { display: block; }

        .card { background: var(--white); border-radius: 22px; padding: 20px; margin-bottom: 18px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        label { font-size: 0.7rem; font-weight: 700; color: #8E8E93; margin-bottom: 4px; display: block; text-transform: uppercase; }
        
        input, select {
            width: 100%; height: 50px; border-radius: 12px; border: 1.5px solid #E5E5EA;
            padding: 0 15px; font-size: 1rem; margin-bottom: 12px; background: #F9F9FB; font-weight: 600;
        }

        .row { display: flex; gap: 10px; }
        .row div { flex: 1; }

        .comp-box { background: #F2F2F7; border-radius: 16px; padding: 12px; margin-top: 10px; }
        .comp-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .comp-input { width: 100px !important; height: 40px !important; margin-bottom: 0 !important; text-align: right; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--dabelle-blue); color: white; padding: 15px; border-radius: 18px; text-align: center; }
        .stat-card b { display: block; font-size: 1.3rem; color: var(--dabelle-gold); }

        .btn-report { width: 100%; height: 54px; border-radius: 14px; border: none; font-weight: 700; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.95rem; }
        .btn-pdf { background: #E5E5EA; color: #1C1C1E; }
        .btn-wa { background: #25D366; color: white; }

        .action-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 25px calc(20px + env(safe-area-inset-bottom));
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px); border-top: 0.5px solid #C6C6C8; z-index: 1000;
        }
        .btn-save { width: 100%; height: 60px; background: var(--dabelle-blue); color: white; border: none; border-radius: 18px; font-size: 1.1rem; font-weight: 700; }
    </style>
</head>
<body>

<header>
    <h1>DutyPrice</h1>
    <span class="version-tag">1.5v</span>
</header>

<nav>
    <button id="tab-collect" class="active" onclick="switchTab('collect')">COLETA</button>
    <button id="tab-dash" onclick="switchTab('dash')">DASHBOARD</button>
</nav>

<div id="view-collect" class="view active">
    <div class="card">
        <label>Nome da Loja</label>
        <input type="text" id="store-name" placeholder="Ex: Atacadão Torquato">
        
        <div class="row">
            <div>
                <label>Bairro</label>
                <input type="text" id="store-bairro" placeholder="Ex: Adrianópolis">
            </div>
            <div>
                <label>Cidade</label>
                <input type="text" id="store-cidade" value="Manaus">
            </div>
        </div>
        
        <div class="row">
            <div style="flex: 0.4;">
                <label>UF</label>
                <input type="text" id="store-uf" value="AM" maxlength="2">
            </div>
            <div style="flex: 1;">
                <label>Canal</label>
                <select id="store-channel">
                    <option value="C&C">C&C (Atacarejo)</option>
                    <option value="Tradicional">Tradicional</option>
                    <option value="1-4 ckt">1-4 Checkouts</option>
                    <option value="5-9 ckt">5-9 Checkouts</option>
                    <option value="10+ ckt">10+ Checkouts</option>
                </select>
            </div>
        </div>
    </div>
    <div id="product-list"></div>
</div>

<div id="view-dash" class="view">
    <div class="card" id="pdf-area">
        <div class="row" style="margin-bottom:15px;">
            <div><label>Início</label><input type="date" id="date-start" onchange="renderDashboard()"></div>
            <div><label>Fim</label><input type="date" id="date-end" onchange="renderDashboard()"></div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">Visitas<b id="d-visitas">0</b></div>
            <div class="stat-card">Média DaBelle<b id="d-media">R$ 0,00</b></div>
        </div>
        
        <canvas id="chartCanal" height="180"></canvas>
        <div id="history-log" style="margin-top:15px; font-size:0.85rem;"></div>
    </div>

    <div class="card">
        <button class="btn-report btn-pdf" onclick="exportPDF()">📄 PDF do Período</button>
        <button class="btn-report btn-wa" onclick="shareWA('periodo')">💬 Resumo Período (WhatsApp)</button>
        <button class="btn-report btn-wa" style="background:#128C7E" onclick="shareWA('loja')">💬 Última Loja Detalhado</button>
    </div>
    <button onclick="clearAll()" style="color:red; width:100%; border:none; background:none; padding:10px; font-size:0.7rem;">LIMPAR TUDO</button>
</div>

<div class="action-bar" id="footer-save">
    <button class="btn-save" onclick="saveVisit()">Salvar Visita</button>
</div>

<script>
    const dbSchema = [
        { cat: "Kits", prod: "DABELLE - KIT SH+COND - 425ML", comps: ["Elseve", "Pantene", "Lola", "Salon Line"] },
        { cat: "Creme de Pentear", prod: "DABELLE - CREME DE PENTEAR - 270G", comps: ["Elseve", "Pantene", "Salon Line", "Skala"] },
        { cat: "Máscaras", prod: "DABELLE - MASCARA - 400G", comps: ["Elseve", "Pantene", "Lola", "Novex"] },
        { cat: "Óleo em Creme", prod: "DABELLE - OLEO EM CREME - 190ML", comps: ["Elseve", "Pantene", "Amend"] },
        { cat: "Óleo Capilar", prod: "DABELLE - OLEO - 45ML", comps: ["Elseve", "Pantene", "Amend"] },
        { cat: "Tratamento 1KG", prod: "DABELLE - CPP JUJUBA - 1KG", comps: ["Skala", "Salon Line"] },
        { cat: "Gelatina", prod: "DABELLE - GELATINA - 500G", comps: ["Salon Line", "Lola"] }
    ];

    let myChart = null;

    function init() {
        const container = document.getElementById('product-list');
        container.innerHTML = dbSchema.map((item, idx) => `
            <div class="card">
                <small style="color:var(--dabelle-gold); font-weight:800;">${item.cat}</small>
                <h2 style="font-size:0.9rem; margin:5px 0; color:var(--dabelle-blue);">${item.prod}</h2>
                <input type="tel" class="db-price" placeholder="R$ 0,00" data-name="${item.prod}" oninput="m(this)">
                <div class="comp-box">
                    ${item.comps.map(c => `
                        <div class="comp-row"><span style="font-size:0.8rem;">${c}</span><input type="tel" class="comp-price" placeholder="0,00" oninput="m(this)"></div>
                    `).join('')}
                </div>
            </div>
        `).join('');
        
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('date-start').value = today;
        document.getElementById('date-end').value = today;
    }

    function m(i) {
        let v = i.value.replace(/\D/g, "");
        if (v === "") return;
        i.value = (parseFloat(v)/100).toLocaleString('pt-BR', {minimumFractionDigits:2});
    }

    function switchTab(t) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        document.getElementById(`view-${t}`).classList.add('active');
        document.getElementById(`tab-${t}`).classList.add('active');
        document.getElementById('footer-save').style.display = (t === 'collect') ? 'block' : 'none';
        if(t === 'dash') renderDashboard();
    }

    function saveVisit() {
        const store = document.getElementById('store-name').value;
        if(!store) return alert("Nome da loja vazio!");

        const prices = [];
        document.querySelectorAll('.db-price').forEach(input => {
            if(input.value) prices.push({ prod: input.dataset.name, price: input.value });
        });

        const visit = {
            store,
            bairro: document.getElementById('store-bairro').value,
            cidade: document.getElementById('store-cidade').value,
            uf: document.getElementById('store-uf').value,
            channel: document.getElementById('store-channel').value,
            date: new Date().toISOString().split('T')[0],
            displayDate: new Date().toLocaleDateString('pt-BR'),
            prices
        };

        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        db.push(visit);
        localStorage.setItem('dutyprice_db', JSON.stringify(db));
        alert("Visita Salva!");
        location.reload();
    }

    function renderDashboard() {
        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        const start = document.getElementById('date-start').value;
        const end = document.getElementById('date-end').value;
        const filtered = db.filter(v => v.date >= start && v.date <= end);
        
        document.getElementById('d-visitas').innerText = filtered.length;
        let sum = 0, count = 0, canais = {};
        filtered.forEach(v => {
            canais[v.channel] = (canais[v.channel] || 0) + 1;
            v.prices.forEach(p => { sum += parseFloat(p.price.replace('.','').replace(',','.')); count++; });
        });

        document.getElementById('d-media').innerText = `R$ ${(count > 0 ? sum/count : 0).toLocaleString('pt-BR',{minimumFractionDigits:2})}`;
        document.getElementById('history-log').innerHTML = filtered.slice().reverse().map(h => `
            <div style="padding:10px 0; border-bottom:0.5px solid #eee;">
                <b>${h.store}</b> (${h.bairro})<br><small>${h.channel} • ${h.displayDate}</small>
            </div>
        `).join('');

        if(myChart) myChart.destroy();
        const ctx = document.getElementById('chartCanal').getContext('2d');
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: { labels: Object.keys(canais), datasets: [{ data: Object.values(canais), backgroundColor: ['#002D58','#C5A059','#004586','#F4E8D1'] }] },
            options: { plugins: { legend: { position:'bottom' } } }
        });
    }

    function exportPDF() {
        const element = document.getElementById('pdf-area');
        html2pdf().set({ margin:10, filename:'DutyPrice_Relatorio.pdf', html2canvas:{scale:2}, jsPDF:{unit:'mm', format:'a4'} }).from(element).save();
    }

    function shareWA(type) {
        const db = JSON.parse(localStorage.getItem('dutyprice_db') || '[]');
        if(db.length === 0) return alert("Sem dados.");
        let text = "";

        if(type === 'loja') {
            const l = db[db.length - 1];
            text = `*DUTYPRICE - RELATÓRIO LOJA*\n\n🏪 *Loja:* ${l.store}\n📍 *Local:* ${l.bairro}, ${l.cidade}-${l.uf}\n🏢 *Canal:* ${l.channel}\n📅 *Data:* ${l.displayDate}\n\n*PREÇOS DABELLE:*\n`;
            l.prices.forEach(p => text += `• ${p.prod}: R$ ${p.price}\n`);
        } else {
            const start = document.getElementById('date-start').value;
            const filtered = db.filter(v => v.date >= start);
            text = `*DUTYPRICE - RESUMO PERÍODO*\n📅 Início: ${start}\n📊 *Lojas:* ${filtered.length}\n\n`;
            filtered.forEach(v => text += `✅ ${v.store} (${v.bairro})\n`);
        }
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }

    function clearAll() { if(confirm("Apagar histórico?")) { localStorage.removeItem('dutyprice_db'); location.reload(); } }
    window.onload = init;
</script>
</body>
</html>
