<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriceScout</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PriceScout">
    <meta name="theme-color" content="#00e5ff">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8/5+hHgAHggJ/PchI7wAAAABJRU5ErkJggg==">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/exif-js"></script>

    <style>
        :root {
            --bg: #0a0a0f;
            --card: #16161e;
            --accent: #00e5ff;
            --text: #ffffff;
            --text-dim: #a0a0ab;
            --danger: #ff4d4d;
            --success: #10b981;
            
            /* Cores por Marca */
            --brand-dabelle: #e91e8c;
            --brand-salonline: #ff6b35;
            --brand-elseve: #3b82f6;
            --brand-ox: #8b5cf6;
            --brand-loreal: #f59e0b;
            --brand-dove: #06b6d4;
            --brand-pantene: #10b981;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 80px 16px 100px 16px;
            overflow-x: hidden;
        }

        /* Header */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 70px;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 1000;
            border-bottom: 1px solid #1f1f2e;
        }

        .logo { font-weight: 800; font-size: 20px; color: var(--accent); letter-spacing: -0.5px; }
        .v-tag { font-size: 10px; background: #1f1f2e; padding: 2px 6px; border-radius: 4px; margin-left: 6px; }
        .header-tools { display: flex; align-items: center; gap: 15px; }
        .counter { font-size: 12px; color: var(--text-dim); }

        /* Navigation */
        nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 85px;
            background: rgba(22, 22, 30, 0.95);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            padding-bottom: 20px;
            z-index: 1000;
            border-top: 1px solid #1f1f2e;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 11px;
            transition: 0.2s;
            background: none; border: none; width: 33%;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* Views */
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI Components */
        .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
        .btn {
            background: var(--accent); color: #000; border: none;
            border-radius: 12px; padding: 12px 20px; font-weight: 600;
            width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px;
            font-size: 15px; cursor: pointer;
        }
        .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        .btn-small { padding: 6px 12px; font-size: 12px; border-radius: 8px; }

        label { display: block; font-size: 12px; color: var(--text-dim); margin: 12px 0 6px 4px; }
        input, select {
            background: #1f1f2e; border: 1px solid #2e2e42; color: white;
            padding: 12px; border-radius: 10px; width: 100%; font-size: 16px;
        }

        /* Camera & Preview */
        #photo-preview {
            width: 100%; height: 220px; object-fit: cover; border-radius: 12px;
            margin-top: 10px; background: #000; display: none;
        }

        /* API Panel */
        #api-panel {
            position: fixed; top: 75px; right: 16px; left: 16px;
            background: var(--card); border: 1px solid var(--accent);
            border-radius: 16px; padding: 20px; z-index: 1001; display: none;
        }

        /* Loading Bar */
        .loading-container { display: none; margin: 20px 0; }
        .loading-bar { height: 4px; background: #1f1f2e; border-radius: 2px; overflow: hidden; }
        .loading-progress { height: 100%; background: var(--accent); width: 30%; animation: scan 1.5s infinite ease-in-out; }
        @keyframes scan { 0% { transform: translateX(-100%); } 100% { transform: translateX(300%); } }

        /* Products Grid */
        .product-card {
            border-left: 4px solid var(--accent);
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px; padding: 10px; background: #1f1f2e; border-radius: 8px;
        }
        .badge-promo { background: var(--danger); color: white; font-size: 9px; padding: 2px 4px; border-radius: 4px; font-weight: bold; }

        /* Dashboard Stats */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; }
        .stat-val { display: block; font-size: 24px; font-weight: 800; color: var(--accent); }
        .stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; }

        .price-bar-bg { background: #1f1f2e; height: 8px; border-radius: 4px; margin-top: 8px; position: relative; }
        .price-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PriceScout<span class="v-tag">v2.4</span></div>
        <div class="header-tools">
            <span class="counter" id="reg-count">0 registros</span>
            <button onclick="toggleApiPanel()" style="background:none; border:none; font-size:20px;">🔑</button>
            <span id="key-status"></span>
        </div>
    </header>

    <div id="api-panel">
        <label>Google AI Key</label>
        <input type="password" id="api-key-input" value="AIzaSyCe3EoWX3-QFWU21VYvN2L8T03pWelgmAY">
        <div style="display:flex; gap:10px; margin-top:15px;">
            <button class="btn btn-small" onclick="testApiKey()">Testar Conexão</button>
            <button class="btn btn-small btn-outline" onclick="toggleApiPanel()">Fechar</button>
        </div>
    </div>

    <div id="view-capture" class="view active">
        <div class="card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn" onclick="capturePhoto('camera')">📸 Câmera</button>
                <button class="btn btn-outline" onclick="capturePhoto('gallery')">📁 Galeria</button>
            </div>
            <input type="file" id="file-input" hidden accept="image/*">
            <img id="photo-preview" alt="Preview">
        </div>

        <div class="card">
            <button class="btn btn-outline btn-small" onclick="getLocation()">📍 Usar localização atual</button>
            
            <label>Loja/PDV</label>
            <input type="text" id="field-store" placeholder="Nome do mercado">
            
            <label>Cidade</label>
            <input type="text" id="field-city" placeholder="Manaus, AM">

            <label>Canal</label>
            <select id="field-channel">
                <option value="Atacarejo">Atacarejo</option>
                <option value="Supermercado">Supermercado</option>
                <option value="Farmácia">Farmácia</option>
                <option value="Distribuidor">Distribuidor</option>
                <option value="Outro">Outro</option>
            </select>
        </div>

        <div class="loading-container" id="loading-ai">
            <div style="text-align:center; font-size:12px; margin-bottom:8px;">Gemini analisando gôndola...</div>
            <div class="loading-bar"><div class="loading-progress"></div></div>
        </div>

        <div id="results-area"></div>

        <button class="btn" id="btn-analyze" style="margin-top:20px; display:none;" onclick="analyzeImage()">Analisar Preços</button>
        <button class="btn" id="btn-save" style="margin-top:20px; display:none;" onclick="saveRecord()">Salvar Registro</button>
    </div>

    <div id="view-dashboard" class="view">
        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="stat-total">0</span><span class="stat-label">Registros</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-stores">0</span><span class="stat-label">Lojas</span></div>
            <div class="stat-card"><span class="stat-val" id="stat-prods">0</span><span class="stat-label">Produtos</span></div>
            <div class="stat-card"><span class="stat-val" style="font-size:14px" id="stat-last">-</span><span class="stat-label">Última Visita</span></div>
        </div>

        <h3 style="margin-top:25px;">Preço Médio por Marca</h3>
        <div id="brand-bars" class="card"></div>
    </div>

    <div id="view-history" class="view">
        <div style="display:flex; justify-content: space-between; align-items:center;">
            <h3>Meus Registros</h3>
            <button class="btn btn-small btn-outline" style="width:auto;" onclick="exportCSV()">Exportar CSV</button>
        </div>
        <div id="history-list"></div>
    </div>

    <nav>
        <button class="nav-item active" onclick="switchTab('capture', this)">
            <span class="nav-icon">📷</span><span>Capturar</span>
        </button>
        <button class="nav-item" onclick="switchTab('dashboard', this)">
            <span class="nav-icon">📊</span><span>Dashboard</span>
        </button>
        <button class="nav-item" onclick="switchTab('history', this)">
            <span class="nav-icon">📜</span><span>Histórico</span>
        </button>
    </nav>

    <script>
        // CONFIGURAÇÕES E ESTADO
        const BRAND_COLORS = {
            'Dabelle': '#e91e8c', 'Salon Line': '#ff6b35', 'Elseve': '#3b82f6',
            'OX': '#8b5cf6', "L'Oréal": '#f59e0b', 'Dove': '#06b6d4', 'Pantene': '#10b981'
        };
        const MODELS = ['gemini-2.0-flash-exp', 'gemini-2.0-flash', 'gemini-2.0-flash-001', 'gemini-2.0-flash-lite', 'gemini-flash-latest'];
        
        let currentPhoto = null;
        let identifiedProducts = [];
        let db = JSON.parse(localStorage.getItem('pricescout_records') || '[]');

        // INICIALIZAÇÃO
        document.addEventListener('DOMContentLoaded', () => {
            updateStats();
            updateCounter();
        });

        function switchTab(viewId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            el.classList.add('active');
            if(viewId === 'dashboard') renderDashboard();
            if(viewId === 'history') renderHistory();
        }

        // CAPTURA E LOCALIZAÇÃO
        function capturePhoto(type) {
            const input = document.getElementById('file-input');
            if(type === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }

        document.getElementById('file-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Preview
            const reader = new FileReader();
            reader.onload = (event) => {
                currentPhoto = event.target.result;
                const img = document.getElementById('photo-preview');
                img.src = currentPhoto;
                img.style.display = 'block';
                document.getElementById('btn-analyze').style.display = 'flex';
            };
            reader.readAsDataURL(file);

            // Tenta ler EXIF
            EXIF.getData(file, function() {
                const lat = EXIF.getTag(this, "GPSLatitude");
                const lon = EXIF.getTag(this, "GPSLongitude");
                if(lat && lon) {
                    const latDec = lat[0] + lat[1]/60 + lat[2]/3600;
                    const lonDec = lon[0] + lon[1]/60 + lon[2]/3600;
                    reverseGeocode(latDec, -lonDec); // Simplificado para hemisfério oeste
                }
            });
        });

        async function getLocation() {
            if (!navigator.geolocation) return alert("GPS não suportado");
            navigator.geolocation.getCurrentPosition(async (pos) => {
                reverseGeocode(pos.coords.latitude, pos.coords.longitude);
            });
        }

        async function reverseGeocode(lat, lon) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await res.json();
                const city = data.address.city || data.address.town || "";
                const neighborhood = data.address.suburb || "";
                document.getElementById('field-city').value = `${city}, ${data.address.state || ''}`;
                if(!document.getElementById('field-store').value) {
                    document.getElementById('field-store').value = neighborhood;
                }
            } catch (e) { console.error("Geocode error", e); }
        }

        // INTEGRAÇÃO GEMINI AI
        async function analyzeImage() {
            const apiKey = document.getElementById('api-key-input').value;
            if(!apiKey) return alert("Insira a API Key no ícone da chave 🔑");

            document.getElementById('loading-ai').style.display = 'block';
            document.getElementById('btn-analyze').disabled = true;

            const base64Data = currentPhoto.split(',')[1];
            const prompt = `Analise a imagem de gôndola e retorne APENAS JSON válido sem markdown com esta estrutura: {"produtos":[{"marca":"","linha":"","tipo":"","preco":0.00,"promocao":false}]}. Extraia todos os produtos com etiqueta de preço visível. Marcas: Dabelle, Salon Line, Elseve, OX, L'Oréal, Dove, Pantene. Linhas: Mel, SOS Crescimento, Cereja, Abacate, Cachos, Brilho, Cronograma Perfeito. Tipos: Shampoo, Condicionador, Creme, Kit, Máscara, Óleo.`;

            let success = false;
            for (let model of MODELS) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: "image/jpeg", data: base64Data } }] }],
                            generationConfig: { maxOutputTokens: 8192, temperature: 0.1 }
                        })
                    });

                    const data = await response.json();
                    let text = data.candidates[0].content.parts[0].text;
                    // Limpeza de possível markdown do Gemini
                    text = text.replace(/```json/g, "").replace(/```/g, "").trim();
                    
                    const result = JSON.parse(text);
                    identifiedProducts = result.produtos;
                    renderIdentified();
                    success = true;
                    break;
                } catch (e) {
                    console.log(`Falha no modelo ${model}, tentando próximo...`);
                }
            }

            document.getElementById('loading-ai').style.display = 'none';
            document.getElementById('btn-analyze').disabled = false;
            if(!success) alert("Erro ao processar imagem. Verifique sua chave ou conexão.");
        }

        function renderIdentified() {
            const area = document.getElementById('results-area');
            area.innerHTML = '<h4 style="margin:15px 0 10px 0">Produtos Encontrados:</h4>';
            
            identifiedProducts.forEach((p, idx) => {
                const color = BRAND_COLORS[p.marca] || '#ffffff';
                const div = document.createElement('div');
                div.className = 'product-card';
                div.style.borderLeftColor = color;
                div.innerHTML = `
                    <div>
                        <strong style="color:${color}">${p.marca}</strong> <span style="font-size:12px">${p.linha} ${p.tipo}</span>
                    </div>
                    <div style="text-align:right">
                        ${p.promocao ? '<span class="badge-promo">PROMO</span>' : ''}
                        <div style="font-weight:bold">R$ ${p.preco.toFixed(2)}</div>
                    </div>
                `;
                area.appendChild(div);
            });
            document.getElementById('btn-save').style.display = 'flex';
        }

        // STORAGE E DADOS
        function saveRecord() {
            const record = {
                id: Date.now(),
                date: new Date().toLocaleDateString('pt-BR'),
                dateISO: new Date().toISOString(),
                store: document.getElementById('field-store').value || "Não informado",
                city: document.getElementById('field-city').value,
                channel: document.getElementById('field-channel').value,
                products: identifiedProducts
            };

            db.unshift(record);
            localStorage.setItem('pricescout_records', JSON.stringify(db));
            
            alert("Registro salvo com sucesso!");
            resetForm();
            updateCounter();
            switchTab('history', document.querySelectorAll('.nav-item')[2]);
        }

        function resetForm() {
            currentPhoto = null;
            identifiedProducts = [];
            document.getElementById('photo-preview').style.display = 'none';
            document.getElementById('results-area').innerHTML = '';
            document.getElementById('btn-save').style.display = 'none';
            document.getElementById('btn-analyze').style.display = 'none';
            document.getElementById('field-store').value = '';
        }

        // DASHBOARD LOGIC
        function renderDashboard() {
            updateStats();
            const brandBars = document.getElementById('brand-bars');
            brandBars.innerHTML = '';

            // Calcular médias
            const brandData = {};
            db.forEach(rec => {
                rec.products.forEach(p => {
                    if(!brandData[p.marca]) brandData[p.marca] = { sum: 0, count: 0 };
                    brandData[p.marca].sum += p.preco;
                    brandData[p.marca].count++;
                });
            });

            const maxPrice = Math.max(...Object.values(brandData).map(b => b.sum/b.count)) || 1;

            Object.keys(brandData).forEach(brand => {
                const avg = brandData[brand].sum / brandData[brand].count;
                const width = (avg / maxPrice) * 100;
                const color = BRAND_COLORS[brand] || '#ddd';

                brandBars.innerHTML += `
                    <div style="margin-bottom:15px">
                        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px">
                            <span>${brand}</span>
                            <strong>R$ ${avg.toFixed(2)}</strong>
                        </div>
                        <div class="price-bar-bg">
                            <div class="price-bar-fill" style="width:${width}%; background:${color}"></div>
                        </div>
                    </div>
                `;
            });
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = db.length;
            document.getElementById('stat-stores').innerText = new Set(db.map(r => r.store)).size;
            document.getElementById('stat-prods').innerText = db.reduce((acc, curr) => acc + curr.products.length, 0);
            document.getElementById('stat-last').innerText = db[0] ? db[0].date : '-';
        }

        function updateCounter() {
            document.getElementById('reg-count').innerText = `${db.length} registros`;
        }

        function renderHistory() {
            const container = document.getElementById('history-list');
            container.innerHTML = '';
            
            db.forEach(rec => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; border-bottom:1px solid #1f1f2e; padding-bottom:8px; margin-bottom:10px">
                        <span style="font-size:12px; font-weight:bold">${rec.store}</span>
                        <span style="font-size:10px; color:var(--text-dim)">${rec.date}</span>
                    </div>
                    ${rec.products.map(p => `
                        <div style="font-size:13px; display:flex; justify-content:space-between; margin-bottom:4px">
                            <span>${p.marca} ${p.tipo}</span>
                            <span>R$ ${p.preco.toFixed(2)}</span>
                        </div>
                    `).join('')}
                `;
                container.appendChild(card);
            });
        }

        // UTILS
        function toggleApiPanel() {
            const p = document.getElementById('api-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        async function testApiKey() {
            const btn = event.target;
            btn.innerText = "Testando...";
            const apiKey = document.getElementById('api-key-input').value;
            
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Oi" }] }] })
                });
                if(res.ok) {
                    document.getElementById('key-status').innerText = "✅";
                    setTimeout(toggleApiPanel, 1000);
                } else {
                    alert("Chave inválida");
                }
            } catch(e) { alert("Erro de conexão"); }
            btn.innerText = "Testar Conexão";
        }

        function exportCSV() {
            let csv = "ID;Data;Loja;Cidade;Canal;Marca;Linha;Tipo;Preco;Promocao\n";
            db.forEach(r => {
                r.products.forEach(p => {
                    csv += `${r.id};${r.date};${r.store};${r.city};${r.channel};${p.marca};${p.linha};${p.tipo};${p.preco};${p.promocao}\n`;
                });
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', `pricescout_export_${Date.now()}.csv`);
            a.click();
        }
    </script>
</body>
</html>
