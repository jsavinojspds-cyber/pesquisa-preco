<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PriceScout v2.5</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00e5ff">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1055/1055644.png">

    <style>
        :root {
            --bg: #0a0a0f; --card: #16161e; --accent: #00e5ff; --text: #ffffff;
            --brand-dabelle: #e91e8c; --brand-salonline: #ff6b35; --brand-elseve: #3b82f6;
            --brand-ox: #8b5cf6; --brand-loreal: #f59e0b; --brand-dove: #06b6d4; --brand-pantene: #10b981;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; padding: 90px 16px 100px 16px;
        }

        /* Header Fix */
        header {
            position: fixed; top: 0; left: 0; right: 0; height: 75px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(12px);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; border-bottom: 1px solid #1f1f2e;
        }

        .logo { font-weight: 800; font-size: 22px; color: var(--accent); }
        .v-tag { font-size: 10px; background: #333; padding: 2px 6px; border-radius: 4px; margin-left: 8px; vertical-align: middle; }
        
        /* UI Elements */
        .card { background: var(--card); border-radius: 18px; padding: 18px; margin-bottom: 16px; border: 1px solid #1f1f2e; }
        .btn {
            background: var(--accent); color: #000; border: none; border-radius: 14px;
            padding: 16px; font-weight: 700; width: 100%; font-size: 16px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:disabled { opacity: 0.5; filter: grayscale(1); }
        
        #photo-preview { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; display: none; margin-bottom: 15px; }

        input, select {
            background: #000; border: 1px solid #2e2e42; color: white;
            padding: 14px; border-radius: 12px; width: 100%; margin-bottom: 12px; font-size: 16px;
        }

        /* Nav */
        nav {
            position: fixed; bottom: 0; left: 0; right: 0; height: 85px;
            background: rgba(22, 22, 30, 0.95); display: flex; border-top: 1px solid #1f1f2e;
        }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #666; font-size: 11px; text-decoration: none; }
        .nav-item.active { color: var(--accent); }

        /* AI Loading */
        .loading-zone { display: none; text-align: center; margin: 20px 0; }
        .bar-bg { background: #1f1f2e; height: 4px; border-radius: 2px; overflow: hidden; margin-top: 10px; }
        .bar-fill { height: 100%; background: var(--accent); width: 40%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: translateX(-100%); } 100% { transform: translateX(250%); } }

        /* API Panel */
        #api-config { position: fixed; top: 80px; left: 16px; right: 16px; background: #16161e; border: 1px solid var(--accent); border-radius: 20px; padding: 20px; z-index: 2000; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <header>
        <div class="logo">PriceScout<span class="v-tag">v2.5</span></div>
        <div style="display:flex; align-items:center; gap:12px;">
            <div id="status-dot" style="width:8px; height:8px; border-radius:50%; background:#555;"></div>
            <button onclick="toggleApi()" style="background:none; border:none; font-size:22px;">🔑</button>
        </div>
    </header>

    <div id="api-config">
        <h4 style="margin-top:0">Configurações de API</h4>
        <input type="password" id="api-key" value="AIzaSyCe3EoWX3-QFWU21VYvN2L8T03pWelgmAY" placeholder="Sua Gemini Key">
        <button class="btn" onclick="testKey()">Salvar e Testar</button>
        <button onclick="toggleApi()" style="background:none; border:none; color:var(--accent); width:100%; margin-top:15px;">Fechar</button>
    </div>

    <div id="view-capture">
        <img id="photo-preview">
        
        <div class="card">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <button class="btn" onclick="openCam('camera')">📸 Foto</button>
                <button class="btn" style="background:#1f1f2e; color:#fff" onclick="openCam('file')">📁 Galeria</button>
            </div>
            <input type="file" id="input-file" hidden accept="image/*">
        </div>

        <div class="card">
            <button onclick="geo()" style="background:none; border:none; color:var(--accent); margin-bottom:15px; font-weight:bold;">📍 Obter Localização Atual</button>
            <input type="text" id="store" placeholder="Nome da Loja">
            <input type="text" id="city" placeholder="Cidade">
            <select id="channel">
                <option>Atacarejo</option>
                <option>Supermercado</option>
                <option>Farmácia</option>
            </select>
        </div>

        <div class="loading-zone" id="loader">
            <small id="loader-msg">Conectando ao Gemini...</small>
            <div class="bar-bg"><div class="bar-fill"></div></div>
        </div>

        <div id="result-list"></div>

        <button class="btn" id="btn-run" style="display:none; margin-top:20px;" onclick="runAI()">Analisar Gôndola</button>
        <button class="btn" id="btn-save" style="display:none; margin-top:15px; background:var(--brand-pantene)" onclick="save()">Salvar no Histórico</button>
    </div>

    <nav>
        <a href="#" class="nav-item active"><span>📷</span>Capturar</a>
        <a href="#" class="nav-item"><span>📊</span>Dash</a>
        <a href="#" class="nav-item"><span>📜</span>Histórico</a>
    </nav>

    <script>
        let currentImg = null;
        let lastProducts = [];
        const MODELS = ['gemini-2.0-flash', 'gemini-1.5-flash', 'gemini-1.5-flash-8b'];

        function toggleApi() {
            const el = document.getElementById('api-config');
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function openCam(mode) {
            const input = document.getElementById('input-file');
            if(mode === 'camera') input.setAttribute('capture', 'environment');
            else input.removeAttribute('capture');
            input.click();
        }

        document.getElementById('input-file').onchange = async (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                currentImg = ev.target.result;
                const p = document.getElementById('photo-preview');
                p.src = currentImg;
                p.style.display = 'block';
                document.getElementById('btn-run').style.display = 'flex';
                document.getElementById('result-list').innerHTML = '';
            };
            reader.readAsDataURL(file);
        };

        async function runAI() {
            const key = document.getElementById('api-key').value;
            const loader = document.getElementById('loader');
            const btn = document.getElementById('btn-run');
            
            loader.style.display = 'block';
            btn.disabled = true;

            // Compressão básica para evitar erro de payload
            const base64Clean = currentImg.split(',')[1];
            
            const prompt = `Retorne APENAS um JSON: {"produtos":[{"marca":"","linha":"","tipo":"","preco":0.00,"promocao":false}]}. Marcas foco: Dabelle, Salon Line, Elseve, OX, L'Oréal, Dove, Pantene. Se não encontrar nada, retorne lista vazia.`;

            let success = false;
            for(let m of MODELS) {
                try {
                    document.getElementById('loader-msg').innerText = `Tentando modelo ${m}...`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${key}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            contents: [{parts: [{text: prompt}, {inline_data: {mime_type: "image/jpeg", data: base64Clean}}]}]
                        })
                    });
                    
                    const data = await res.json();
                    let raw = data.candidates[0].content.parts[0].text;
                    // Limpeza radical de JSON
                    const jsonMatch = raw.match(/\{[\s\S]*\}/);
                    if(!jsonMatch) throw new Error("JSON não encontrado");
                    
                    const parsed = JSON.parse(jsonMatch[0]);
                    lastProducts = parsed.produtos;
                    render(lastProducts);
                    success = true;
                    break;
                } catch(err) { console.error("Falha no modelo", m); }
            }

            loader.style.display = 'none';
            btn.disabled = false;
            if(!success) alert("Falha na análise. Verifique a chave ou iluminação da foto.");
        }

        function render(prods) {
            const div = document.getElementById('result-list');
            div.innerHTML = `<h3 style="margin:20px 0 10px 0">Produtos (${prods.length})</h3>`;
            prods.forEach(p => {
                const color = BRAND_COLORS[p.marca] || '#555';
                div.innerHTML += `
                    <div style="background:#1f1f2e; padding:12px; border-radius:10px; margin-bottom:8px; border-left:4px solid ${color}; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <div style="font-weight:bold; color:${color}">${p.marca}</div>
                            <div style="font-size:12px; color:#aaa">${p.linha} ${p.tipo}</div>
                        </div>
                        <div style="text-align:right">
                            <div style="font-size:18px; font-weight:bold">R$ ${p.preco.toFixed(2)}</div>
                            ${p.promocao ? '<span style="background:red; font-size:9px; padding:2px 5px; border-radius:4px;">PROMO</span>' : ''}
                        </div>
                    </div>
                `;
            });
            document.getElementById('btn-save').style.display = 'flex';
            document.getElementById('btn-run').style.display = 'none';
        }

        const BRAND_COLORS = { 'Dabelle': '#e91e8c', 'Salon Line': '#ff6b35', 'Elseve': '#3b82f6', 'OX': '#8b5cf6', "L'Oréal": '#f59e0b', 'Dove': '#06b6d4', 'Pantene': '#10b981' };

        function save() {
            const record = {
                ts: Date.now(),
                store: document.getElementById('store').value,
                city: document.getElementById('city').value,
                prods: lastProducts
            };
            let db = JSON.parse(localStorage.getItem('ps_records') || '[]');
            db.unshift(record);
            localStorage.setItem('ps_records', JSON.stringify(db));
            alert("Salvo com sucesso!");
            location.reload();
        }

        async function geo() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const data = await res.json();
                document.getElementById('city').value = data.address.city || data.address.town || "Manaus";
                document.getElementById('store').value = data.address.suburb || "";
            });
        }
    </script>
</body>
</html>
